<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat – Chatwoot</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.25rem; color: #333; }
    .note {
      font-size: 0.875rem;
      color: #666;
      margin-top: 1rem;
      padding: 0.75rem;
      background: #f5f5f5;
      border-radius: 6px;
    }
    .note code { font-size: 0.8em; background: #eee; padding: 0.1em 0.3em; border-radius: 3px; }
    
    /* Custom Chat Widget Styles */
    .cw-container {
      position: fixed;
      bottom: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .cw-container.left { left: 20px; align-items: flex-start; }
    .cw-container.middle { left: 50%; transform: translateX(-50%); align-items: center; }
    .cw-container.right { right: 20px; }

    .cw-iframe {
      width: 400px;
      height: 600px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      display: none; /* Hidden by default */
      margin-bottom: 16px;
      background: transparent;
    }

    .cw-bubble {
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background: #1f93ff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      font-size: 24px;
      transition: transform 0.2s;
    }
    
    .cw-bubble:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Chat</h1>
  <p>Use the chat bubbles to open the widget and talk to support.</p>
  <div class="note">
    Chat widget loads from your Chatwoot instance. If the page is not on the same origin, set <code>BASE_URL</code> to your Chatwoot URL (e.g. <code>http://44.215.200.55:3000</code>).
  </div>

  <div class="cw-container left">
    <iframe id="iframe-left" class="cw-iframe" src="./left-widget.html"></iframe>
    <div class="cw-bubble" onclick="toggleChat('left')">💼</div>
  </div>

  <div class="cw-container middle">
    <iframe id="iframe-middle" class="cw-iframe" src="./middle-widget.html"></iframe>
    <div class="cw-bubble" onclick="toggleChat('middle')">🤖</div>
  </div>

  <div class="cw-container right">
    <iframe id="iframe-right" class="cw-iframe" src="./right-widget.html"></iframe>
    <div class="cw-bubble" onclick="toggleChat('right')">💬</div>
  </div>

  <script>
    function toggleChat(side) {
      const iframe = document.getElementById('iframe-' + side);
      if (iframe.style.display === 'block') {
        iframe.style.display = 'none';
        // Tell the iframe to close the internal Chatwoot widget
        iframe.contentWindow.postMessage({ action: "closeChatwoot" }, "*");
      } else {
        iframe.style.display = 'block';
        // Tell the iframe to open the internal Chatwoot widget
        iframe.contentWindow.postMessage({ action: "openChatwoot" }, "*");
      }
    }

    // Listen for the native "X" click coming from the Chatwoot iframes
    window.addEventListener("message", function(event) {
      if (event.data && event.data.action === "closeWidget") {
        const iframe = document.getElementById('iframe-' + event.data.side);
        if (iframe) {
          iframe.style.display = 'none';
        }
      }
    });
  </script>
</body>
</html>
