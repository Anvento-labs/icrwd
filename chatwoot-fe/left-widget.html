<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Left Widget</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
  </style>
</head>
<body>
  <script>
    window.chatwootSettings = {
      hideMessageBubble: true,
      position: "left"
    };
    (function(d,t) {
      var BASE_URL="http://44.215.200.55:3000";
      var g=d.createElement(t),s=d.getElementsByTagName(t)[0];
      g.src=BASE_URL+"/packs/js/sdk.js";
      g.defer = true;
      g.async = true;
      s.parentNode.insertBefore(g,s);
      g.onload=function(){
        window.chatwootSDK.run({
          websiteToken: 'ba8AzaHdfRNpBrB4pV5g5nWt', 
          baseUrl: BASE_URL
        });
        // We let index.html control when to open the widget
      }
    })(document,"script");

    // 1. Listen for the native "X" (close) click from Chatwoot
    window.addEventListener("message", function(event) {
      try {
        var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data.type === "close-widget") {
          window.parent.postMessage({ action: "closeWidget", side: "left" }, "*");
        }
      } catch(e) {}
    });

    // 2. Listen for clicks on the custom blue buttons from index.html
    window.addEventListener("message", function(event) {
      if (event.data && event.data.action === "openChatwoot" && window.$chatwoot) {
        window.$chatwoot.toggle("open");
      } else if (event.data && event.data.action === "closeChatwoot" && window.$chatwoot) {
        window.$chatwoot.toggle("close");
      }
    });
  </script>
</body>
</html>
